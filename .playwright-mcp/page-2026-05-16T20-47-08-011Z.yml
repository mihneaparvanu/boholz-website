            - generic [ref=e120]:
              - heading "Skynest is an add-on" [level=3] [ref=e121]
              - generic [ref=e122]: You can book a four-hour Skynest session in addition to your Economy or Premium Economy seat. Sessions are planned outside meal service and one session can be booked per passenger, per flight. For all-flight comfort, explore our other options.
              - link "Your experience options" [ref=e124] [cursor=pointer]:
                - /url: /economy-skynest#comfort
            - generic [ref=e125]:
              - heading "Who can book Skynest?" [level=3] [ref=e126]
              - generic [ref=e127]: Skynest is available to Economy and Premium Economy passengers aged 15 years and older. Depending on your travel group, you may want to check out our other comfort options such as Skycouch™.
              - link "Compare Skynest and Skycouch" [ref=e129] [cursor=pointer]:
                - /url: /economy-skynest#comparison
            - generic [ref=e130]:
              - heading "Accessing the Skynest" [level=3] [ref=e131]
              - generic [ref=e132]: You'll need to get in and out of the nest on your own, which may involve bending, kneeling, crawling, or climbing. Top and middle nests are elevated, while bottom nests are at floor level and may be easier to access.
              - link "More about accessing Skynest" [ref=e134] [cursor=pointer]:
                - /url: /economy-skynest#access
            - generic [ref=e135]:
              - heading "Booking Skynest" [level=3] [ref=e136]
              - generic [ref=e137]: Skynest will be available on our Boeing 787-9 V5 aircraft, on select ultra long-haul flights between New York and Auckland. On sale 18 May, travel from November 2026.
