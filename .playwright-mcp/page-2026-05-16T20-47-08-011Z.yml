      - generic [ref=e347]:
        - heading "Travelling with children" [level=2] [ref=e348]
        - paragraph [ref=e349]: If you're travelling with children, please note that children under 12 years old must be accompanied in the cabin at all times by someone 15 years or older. If there are two adults in your travelling party, then one adult can use Skynest while the other stays in the cabin with the child.
        - heading "Special assistance" [level=2] [ref=e350]
        - paragraph [ref=e351]: Passengers requiring special assistance are welcome to book Skynest. As everyone's needs are different, it may not be the right fit for every passenger. To use the Skynest safely, you'll need to be able to get in and out of your nest independently, or with the help of your own safety assistant if you're travelling with one.
        - paragraph [ref=e352]: Our cabin crew are here to help you feel comfortable and informed. While they are unable to provide physical assistance, lifting, or transfer support, they will provide a briefing regarding the features of the Skynest. Rest assured that our cabin crew will carry out regular checks of the Skynest throughout the session.
        - paragraph [ref=e353]: For passengers looking for easier access, the bottom nests (Nests 5 and 6) and middle nests (Nests 3 and 4) are generally more accessible than the top nests (Nests 1 and 2), and may be the best option when available.
        - paragraph [ref=e354]:
          - text: You can learn more about
          - link "flying with a wheelchair" [ref=e355] [cursor=pointer]:
            - /url: /special-assistance-service-people-flying-with-wheelchairs
          - text: ","
          - link "support for blind or low vision passengers" [ref=e356] [cursor=pointer]:
            - /url: /special-assistance-blind-and-visually-impaired
          - text: ", or"
          - link "flying with a service dog" [ref=e357] [cursor=pointer]:
            - /url: /special-assistance-flying-service-dog
          - text: . If you have any questions before you fly, please get in touch with our team.
        - paragraph [ref=e358]
