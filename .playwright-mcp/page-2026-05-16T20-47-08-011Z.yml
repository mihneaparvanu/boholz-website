              - paragraph [ref=e98]: Economy Skynest™ is the world's first sleep pods in the sky.
              - generic [ref=e100]:
                - paragraph [ref=e101]: Skynest features six individual lie-flat nests designed for Economy and Premium Economy passengers. Book a four-hour session to leave your seat behind, recharge mid-journey, and enjoy a quiet, private space to rest.
                - paragraph [ref=e102]:
                  - strong [ref=e103]: "Nest dimensions:"
                  - text: Each nest is around 203cm (6.6 feet/ 80 inches) in length, and width at the shoulder is around 64cm (25 inches), tapering to around 41cm (16 inches) at the feet.
                - paragraph [ref=e104]:
                  - strong [ref=e105]: Coming soon exclusively to select ultra long-haul flights between New York and Auckland. On sale 18 May, travel from November 2026.
          - paragraph [ref=e107]:
