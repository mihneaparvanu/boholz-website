          - generic [ref=e322]:
            - generic [ref=e324]: Middle nests (Nests 3 and 4) can generally be accessed while standing. You can sit on it and shuffle in, or get in with some help from a step on the ladder. Middle nests are approximately 1m (36 inches) from the ground.
