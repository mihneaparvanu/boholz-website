        - heading "Skynest or Skycouch? Choose your comfort." [level=2] [ref=e370]
        - generic [ref=e371]:
          - heading "What is it?" [level=3] [ref=e373]
          - generic [ref=e374]:
            - strong [ref=e376]: Skynest
            - paragraph
            - paragraph [ref=e377]: Skynest is a lie-flat experience in a dedicated part of the Economy cabin, available for Economy and Premium Economy passengers. There are six nests available for six nesters at a time.
            - paragraph
            - strong [ref=e379]: Skycouch
            - paragraph
            - paragraph [ref=e380]: Skycouch is a row of Economy seats that convert to a lie-flat couch space. Enjoy Skycouch solo, in a pair, or with family.
            - paragraph
            - separator [ref=e381]
        - generic [ref=e382]:
          - heading "How it works" [level=3] [ref=e384]
          - generic [ref=e385]:
            - strong [ref=e387]: Skynest
            - paragraph
            - paragraph [ref=e388]: Skynest is your own lie-flat space to enjoy for a four-hour session. You'll be away from your seat for that time to recharge in comfort and enjoy a world of your own.
            - paragraph
            - strong [ref=e390]: Skycouch
            - paragraph [ref=e391]: Skycouch seats are like standard Economy seats, but with adjustable leg rests. Raise them halfway for a relaxed recline, or all the way up to create a lie-flat couch space.
            - separator [ref=e392]
        - generic [ref=e393]:
          - heading "Benefits" [level=3] [ref=e395]
          - generic [ref=e396]:
            - strong [ref=e398]: Skynest
            - paragraph [ref=e399]: Skynest provides a break from your seat. It's a great way to break up your journey and have the ability to lie flat in your own calm space for four hours.
            - strong [ref=e401]: Skycouch
            - paragraph [ref=e402]: Skycouch provides additional space to spread out in a seat that's yours for the entire journey. It's a great option if you want a more flexible space for a young child or infant, or even for yourself.
            - separator [ref=e403]
        - generic [ref=e404]:
          - heading "Amenities" [level=3] [ref=e406]
          - generic [ref=e407]:
            - strong [ref=e409]: Skynest
            - paragraph
            - paragraph [ref=e410]: Skynest comes fitted with fresh linen, a blanket and pillow for your session. You'll also receive a complimentary Nestcessities amenity kit complete with earplugs and eye mask.
            - paragraph
            - strong [ref=e412]: Skycouch
            - paragraph [ref=e413]: Skycouch comes with extra bedding, a seat liner and Skycouch kit with an adult/child loop and cuddle belt so you can stretch out safely and enjoy your space in comfort.
            - separator [ref=e414]
        - generic [ref=e415]:
          - heading "Things to know" [level=3] [ref=e417]
          - generic [ref=e418]:
            - strong [ref=e420]: Skynest
            - paragraph
            - paragraph [ref=e421]: Skynest access requires getting in and out of the nest on your own, which may involve bending, kneeling, crawling, or climbing to enter and orientate yourself around within the space.
            - paragraph [ref=e422]: Nesters must be at least 15 years old or older.
            - paragraph
            - strong [ref=e424]: Skycouch
            - paragraph
            - paragraph [ref=e425]: Skycouch is a lie-flat couch experience rather than a bed. It's a great option if travelling with kids and infants.
            - paragraph
            - separator [ref=e426]
        - generic [ref=e427]:
          - heading "Measurements" [level=3] [ref=e429]
          - generic [ref=e430]:
            - strong [ref=e432]: Skynest
            - paragraph [ref=e433]: 2-metre (6ft 5") x 58cm (23") at widest point
            - strong [ref=e435]: Skycouch
            - paragraph [ref=e436]: 1.55m (5ft 1") long x 74cm (29") wide
            - separator [ref=e437]
        - generic [ref=e438]:
          - heading "Availability" [level=3] [ref=e440]
          - generic [ref=e441]:
            - strong [ref=e443]: Skynest
            - paragraph
            - paragraph [ref=e444]: Skynest is located between the Economy and Premium Economy cabins onboard our Boeing 787-9 V5 aircraft.
            - paragraph
            - strong [ref=e446]: Skycouch
            - paragraph [ref=e447]: Skycouch seats are located in some rows within the Economy cabin of our Boeing 777-300ER and 787-9 aircraft. Skycouch is not offered on 777-367ER aircraft.
