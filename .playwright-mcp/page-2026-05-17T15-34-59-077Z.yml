            - generic [ref=e36]:
              - generic [ref=e40]:
                - paragraph [ref=e41]: Nachhaltiges Bauen mit BoHolz Haus – Gut für Sie und die Umwelt. Bei BoHolz Haus verbinden wir Ihre Wohnträume mit aktivem Umweltschutz. Unsere individuellen Fertighäuser aus Holz sind nicht nur Ihr persönliches Zuhause, sondern auch ein Beitrag zu einer besseren Zukunft.
                - paragraph [ref=e42]
                - heading "Warum sich nachhaltig bauen mit BoHolz Haus lohnt" [level=2] [ref=e43]
                - list [ref=e44]:
                  - listitem [ref=e45]:
                    - generic [ref=e46]: "Klimaschutz:"
                    - text: Holz speichert CO2 und entlastet so die Atmosphäre. Ein BoHolz-Haus bindet durchschnittlich 30 Tonnen CO2 – das entspricht der Emission eines Mittelklassewagens über 10 Jahre.
                  - listitem [ref=e47]:
                    - generic [ref=e48]: "Energieeffizienz:"
                    - text: Unsere Häuser erfüllen höchste Energiestandards. Sie profitieren von niedrigen Heizkosten und staatlichen Förderungen für KfW-Effizienzhäuser KfW 55 und KfW 40.
                  - listitem [ref=e49]:
                    - generic [ref=e50]: "Gesundes Wohnklima:"
                    - generic [ref=e51]:
                      - text: Holz reguliert natürlich die Luftfeuchtigkeit und sorgt für ein angenehmes
                      - text: Raumklima.
                  - listitem [ref=e52]:
                    - generic [ref=e53]: "Regionale Wertschöpfung:"
                    - text: Wir verwenden Holz aus nachhaltiger Forstwirtschaft in der Region und unterstützen so lokale Wirtschaftskreisläufe.
                  - listitem [ref=e54]:
                    - generic [ref=e55]: "Langlebigkeit:"
                    - text: Ein BoHolz-Haus ist für Generationen gebaut und bleibt über Jahrzehnte wertstabil.
                  - listitem [ref=e56]:
                    - generic [ref=e57]: "Recyclingfähigkeit:"
                    - text: Am Ende seiner langen Lebensdauer lässt sich ein Holzhaus problemlos recyceln oder thermisch verwerten.
              - heading "Wir machen mit!" [level=1] [ref=e64]:
                - link "Wir machen mit!" [ref=e66] [cursor=pointer]:
