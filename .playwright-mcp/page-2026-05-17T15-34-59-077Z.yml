                  - strong [ref=e67]: Wir machen mit!
            - generic [ref=e69]:
              - paragraph [ref=e70]: Mit einem BoHolz-Haus entscheiden Sie sich für Wohnkomfort und Nachhaltigkeit. Sie genießen ein individuelles Zuhause und leisten gleichzeitig einen wertvollen Beitrag zum Umweltschutz. Lassen Sie uns gemeinsam Ihre grüne Zukunft bauen – mit einem nachhaltigen Fertighaus von BoHolz Haus.
              - paragraph [ref=e71]
              - heading "Holz rettet Klima – aktiver Klimaschutz mit Wohlfühlfaktor" [level=2] [ref=e72]:
                - link "Holz rettet Klima" [ref=e73] [cursor=pointer]:
                  - /url: https://boholz-haus.de/bauen-mit-uns/nachhaltigkeit/
                  - strong [ref=e74]: Holz rettet Klima
                - strong [ref=e75]: – aktiver Klimaschutz mit Wohlfühlfaktor
              - paragraph [ref=e76]: Lebendigkeit – das ist es, was Holz für uns als Rohstoff für den Bau Ihres Eigenheims so besonders macht. Schon seit Jahrhunderten wird Holz auch aufgrund seiner Beständigkeit verwendet. So trotzt es Wind und Wetter und kann sich den widrigsten Bedingungen anpassen. Dabei ist es mit seiner zugleich wärmenden und kühlenden Eigenschaft der perfekte Baustoff für Ihr Traumhaus.
              - paragraph [ref=e77]
              - heading "Handwerkliche Exzellenz trifft auf Nachhaltigkeit" [level=2] [ref=e78]:
                - strong [ref=e79]: Handwerkliche Exzellenz trifft auf Nachhaltigkeit
              - paragraph [ref=e80]:
                - text: Ihr BoHolz Haus wird in der renommierten Manufaktur der Keitel-Haus GmbH in Rot am See-Brettheim gefertigt. Als unser Premium-Partner vereint Keitel-Haus traditionelles Handwerk mit modernster Nachhaltigkeit. In ihrer hochspezialisierten Werkstatt verwandeln erfahrene Handwerkerinnen und Handwerker Ihre Wohnträume in Realität.
                - text: Jedes Bauteil Ihres individuell gestalteten Hauses wird hier mit höchster Präzision und aus sorgfältig ausgewählten, umweltfreundlichen Materialien gefertigt. Diese Kombination aus Handwerkskunst und nachhaltiger Produktion ermöglicht es, Ihr Traumhaus in erstaunlich kurzer Zeit zu errichten – oft in nur wenigen Tagen.
              - paragraph [ref=e81]
              - heading "Profitieren Sie von KfW Fördermöglichkeiten für nachhaltiges Bauen" [level=2] [ref=e82]:
                - strong [ref=e83]: Profitieren Sie von KfW Fördermöglichkeiten für nachhaltiges Bauen
