name: Deploy BoHolz Frontend
on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Build Astro
        run: npm run build

      - name: Deploy to Arch via Rsync
        uses: Burnett01/rsync-deployments@5.2.1
        with:
          switches: -avzr --delete
          path: dist/
          remote_path: /etc/docker/containers/boholz-frontend/dist
          remote_host: ${{ secrets.SERVER_IP }}
          remote_user: m
          remote_key: ${{ secrets.SSH_PRIVATE_KEY }}
