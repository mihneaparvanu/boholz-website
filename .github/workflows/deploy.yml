name: Deploy Boholz with Railpack
on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Image with Railpack
        run: |
          docker run --rm -v $(pwd):/app -v /var/run/docker.sock:/var/run/docker.sock \
          ghcr.io/railwayapp/railpack:latest build /app --name ghcr.io/${{ github.repository }}/boholz-app:latest

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Image
        run: docker push ghcr.io/${{ github.repository }}/boholz-app:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: SSH and Update VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/clients/boholz/frontend
            docker compose pull
            docker compose up -d
