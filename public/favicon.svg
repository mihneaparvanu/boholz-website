<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!--
    Boholz "b" monogram. The full wordmark is unreadable at favicon sizes,
    so we lean on the brand's first letter as a single high-contrast glyph.
    Transparent background — the mark inherits the user's browser surface
    via prefers-color-scheme so a dark-mode tab bar gets a light mark and
    vice versa. Modern browsers (Chrome 80+, Firefox 41+, Safari 17+)
    honour CSS-in-SVG for favicons; older clients fall back to favicon.ico.
  -->
  <style>
    :root { --fg: #1a1a1a; }
    @media (prefers-color-scheme: dark) {
      :root { --fg: #fcfcfc; }
    }
    .fg { fill: var(--fg); }
  </style>

  <!-- Stem -->
  <rect class="fg" x="68" y="48" width="104" height="416" />

  <!-- Bowl: outer circle minus inner circle (donut via evenodd). -->
  <path
    class="fg"
    fill-rule="evenodd"
    d="M156 320 A144 144 0 0 1 444 320 A144 144 0 0 1 156 320 Z
       M220 320 A80 80 0 0 0 380 320 A80 80 0 0 0 220 320 Z"
  />
</svg>
